<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Musiicode — a music-writing IDE</title>
<style>
  :root {
    --bg: #1e1e2e;            --bg-2: #181825;       --panel: #232334;
    --editor-bg: #1a1a28;     --text: #cdd6f4;       --muted: #6c7086;
    --line: #313244;          --accent: #89b4fa;     --caret: #f5e0dc;
    --sel: #45475a;           --header: #11111b;
    --fn-tonic: #a6e3a1;      --fn-sub: #89b4fa;     --fn-dom: #f38ba8;
    --fn-chrom: #cba6f7;      --fn-unknown: #9399b2; --section: #fab387;
    --lyric: #bac2de;         --shadow: rgba(0,0,0,.45);
  }
  [data-theme="light"] {
    --bg: #f5f5fa;            --bg-2: #eaeaf2;       --panel: #ffffff;
    --editor-bg: #fbfbfd;     --text: #1f2335;       --muted: #8086a0;
    --line: #e2e2ee;          --accent: #2563eb;     --caret: #d4006a;
    --sel: #d7e3ff;           --header: #eef0f7;
    --fn-tonic: #1a8f4a;      --fn-sub: #2563eb;     --fn-dom: #d62246;
    --fn-chrom: #8b3fd6;      --fn-unknown: #8086a0; --section: #d97706;
    --lyric: #3a3f55;         --shadow: rgba(0,0,0,.12);
  }
  [data-theme="terminal"] {
    --bg: #0a0f0a;            --bg-2: #060a06;       --panel: #0e160e;
    --editor-bg: #060b06;     --text: #2ee66a;       --muted: #2a7a45;
    --line: #143b21;          --accent: #33ff99;     --caret: #b6ff00;
    --sel: #173b22;           --header: #050805;
    --fn-tonic: #33ff99;      --fn-sub: #00e0c8;     --fn-dom: #ffd166;
    --fn-chrom: #ff7edb;      --fn-unknown: #4f8a63; --section: #c8ff5e;
    --lyric: #74e69a;         --shadow: rgba(0,0,0,.6);
  }
  [data-theme="sepia"] {
    --bg: #f4ecd8;            --bg-2: #ece0c5;       --panel: #fbf5e6;
    --editor-bg: #f7f0dd;     --text: #4b3a2a;       --muted: #9c8568;
    --line: #ddccaa;          --accent: #a8651f;     --caret: #b03a2e;
    --sel: #e6d4ab;           --header: #e9dcbf;
    --fn-tonic: #5f7d3a;      --fn-sub: #2f6f7d;     --fn-dom: #b04632;
    --fn-chrom: #8a5a9c;      --fn-unknown: #9c8568; --section: #b87333;
    --lyric: #5b4636;         --shadow: rgba(80,60,30,.22);
  }
  [data-theme="pastel"] {
    --bg: #fdf3f8;            --bg-2: #f2f0fb;       --panel: #ffffff;
    --editor-bg: #fbf5fb;     --text: #4a4566;       --muted: #a99fc4;
    --line: #ecdcef;          --accent: #6aa8f2;     --caret: #f48fb1;
    --sel: #f3e3f6;           --header: #f6ecfa;
    --fn-tonic: #5bbf93;      --fn-sub: #5f9bf0;     --fn-dom: #ec6fa0;
    --fn-chrom: #a98ce4;      --fn-unknown: #b3aacc; --section: #ef93bf;
    --lyric: #5a5478;         --shadow: rgba(180,140,180,.22);
  }
  [data-theme="mono-dark"] {        /* White on Black — pure monochrome */
    --bg: #000000;            --bg-2: #000000;       --panel: #0b0b0b;
    --editor-bg: #000000;     --text: #ffffff;       --muted: #8a8a8a;
    --line: #2c2c2c;          --accent: #ffffff;     --caret: #ffffff;
    --sel: #333333;           --header: #000000;
    --fn-tonic: #ffffff;      --fn-sub: #ffffff;     --fn-dom: #ffffff;
    --fn-chrom: #ffffff;      --fn-unknown: #8a8a8a; --section: #ffffff;
    --lyric: #ffffff;         --shadow: rgba(0,0,0,.8);
  }
  [data-theme="mono-light"] {       /* Black on White — pure monochrome */
    --bg: #ffffff;            --bg-2: #ffffff;       --panel: #ffffff;
    --editor-bg: #ffffff;     --text: #000000;       --muted: #6a6a6a;
    --line: #d6d6d6;          --accent: #000000;     --caret: #000000;
    --sel: #d6d6d6;           --header: #ffffff;
    --fn-tonic: #000000;      --fn-sub: #000000;     --fn-dom: #000000;
    --fn-chrom: #000000;      --fn-unknown: #6a6a6a; --section: #000000;
    --lyric: #000000;         --shadow: rgba(0,0,0,.18);
  }
  [data-theme="psych"] {            /* rainbow / psychedelic — animated (see keyframes below) */
    --bg: #14001f;            --bg-2: #0d0014;       --panel: #1e0a2e;
    --editor-bg: #160620;     --text: #f5e9ff;       --muted: #a98fc0;
    --line: #3a1d52;          --accent: #ff4ff0;     --caret: #ffe14d;
    --sel: #45206b;           --header: #0c0014;
    --fn-tonic: #4dff88;      --fn-sub: #4dd6ff;     --fn-dom: #ff5d8f;
    --fn-chrom: #c77dff;      --fn-unknown: #a98fc0; --section: #ffd24d;
    --lyric: #ecd9ff;         --shadow: rgba(0,0,0,.5);
  }
  /* psychedelic animations: flowing toolbar gradient + cycling chart hues */
  @keyframes psychHue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  @keyframes psychFlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  [data-theme="psych"] .topbar {
    background: linear-gradient(120deg,#3a0ca3,#7209b7,#f72585,#4361ee,#4cc9f0,#3a0ca3);
    background-size: 300% 300%; animation: psychFlow 16s ease infinite;
  }
  [data-theme="psych"] .preview-scroll { animation: psychHue 12s linear infinite; }
  [data-theme="psych"] .brand { animation: psychHue 5s linear infinite; }
  [data-theme="psych"] .doc-title { animation: psychHue 7s linear infinite; }
  @media (prefers-reduced-motion: reduce) {
    [data-theme="psych"] .topbar, [data-theme="psych"] .preview-scroll,
    [data-theme="psych"] .brand, [data-theme="psych"] .doc-title { animation: none; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 8px 14px;
    background: var(--header); border-bottom: 1px solid var(--line);
    -webkit-app-region: drag; flex-shrink: 0;
  }
  .brand { font-weight: 700; letter-spacing: .5px; font-size: 14px; }
  .brand .dot { color: var(--accent); }
  .topbar .spacer { flex: 1; }
  .pill {
    -webkit-app-region: no-drag; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); border-radius: 8px; padding: 5px 10px; font-size: 12px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; user-select: none;
  }
  .pill:hover { border-color: var(--accent); }
  .pill b { color: var(--accent); font-variant-numeric: tabular-nums; }
  .kbd { font-size: 10px; color: var(--muted); border: 1px solid var(--line);
    border-radius: 4px; padding: 1px 5px; }

  /* ---- main split ---- */
  .main { display: flex; flex: 1; min-height: 0; }
  .pane { display: flex; flex-direction: column; min-width: 0; }
  .pane.editor { width: 44%; flex: 0 0 auto; }
  .pane.preview { flex: 1 1 0; background: var(--bg-2); }
  /* draggable splitter */
  .divider { flex: 0 0 6px; cursor: col-resize; background: var(--line);
    position: relative; transition: background .15s; }
  .divider::after { content: ""; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); width: 2px; height: 30px; border-radius: 2px;
    background: var(--muted); opacity: .5; }
  .divider:hover, .divider.dragging { background: var(--accent); }
  .divider:hover::after, .divider.dragging::after { opacity: 0; }
  body.col-resizing { cursor: col-resize; user-select: none; }
  body.col-resizing textarea#src { pointer-events: none; }
  .pane-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    padding: 6px 14px; border-bottom: 1px solid var(--line); display:flex; gap:10px; align-items:center;
  }
  .pane-head .spacer { flex:1; }
  .pane-head a { color: var(--muted); cursor:pointer; text-decoration: none; }
  .pane-head a:hover { color: var(--accent); }

  /* ---- editor ---- */
  .editor-wrap { position: relative; flex: 1; min-height: 0; }
  textarea#src {
    position: absolute; inset: 0; width: 100%; height: 100%; resize: none; border: 0;
    background: var(--editor-bg); color: var(--text); padding: 14px 14px 14px 14px;
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 14px; line-height: 1.7; tab-size: 4; outline: none; caret-color: var(--caret);
    white-space: pre; overflow: auto;
  }
  textarea#src::selection { background: var(--sel); }

  /* ---- preview ---- */
  .preview-scroll { flex: 1; overflow: auto; padding: 22px 26px 120px; }
  .doc-title { font-size: 24px; font-weight: 700; margin: 0 0 2px; }
  .doc-meta { color: var(--muted); font-size: 12px; margin-bottom: 22px;
    display:flex; gap:14px; flex-wrap:wrap; }
  .doc-meta span b { color: var(--accent); }
  .section-h { color: var(--section); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 1.5px; margin: 24px 0 10px; }
  .change-badge { display: inline-block; margin: 10px 0 4px; padding: 3px 10px;
    border-radius: 999px; font-size: 12px; border: 1px dashed var(--line); }
  .change-badge b { font-family: ui-monospace, Menlo, monospace; }
  .change-badge.key { color: var(--accent); border-color: var(--accent); }
  .change-badge.bpm { color: var(--section); border-color: var(--section); }
  .named-label { color: var(--accent); font-weight: 700; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; margin: 14px 0 4px; font-family: ui-monospace, Menlo, monospace; }
  .named-missing { color: var(--fn-dom); font-size: 12px; font-style: italic; margin: 2px 0; }
  .reharm-tag { display: inline-block; color: var(--section); font-size: 10px;
    font-family: ui-monospace, Menlo, monospace; margin-top: 3px; opacity: .8; }

  /* bars */
  .bar-row { display: flex; flex-wrap: wrap; gap: 0; margin: 8px 0; }
  .bar {
    border: 1px solid var(--line); border-right: 0; padding: 10px 8px 8px;
    min-width: 120px; display: flex; gap: 14px; align-items: flex-start;
    position: relative;
  }
  .bar:first-child { border-radius: 6px 0 0 6px; }
  .bar-row .bar:last-child { border-right: 1px solid var(--line); border-radius: 0 6px 6px 0; }
  .bar::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 2px; background: var(--line); }

  /* chord chip */
  .chip { cursor: pointer; user-select: none; text-align: center; line-height: 1.25;
    border-radius: 5px; padding: 2px 5px; transition: background .12s; }
  .chip:hover { background: var(--sel); }
  .chip .sym { font-weight: 700; font-size: 15px;
    font-family: ui-monospace, Menlo, monospace; }
  .chip .rn { font-size: 10px; color: var(--muted); margin-top: 1px;
    font-family: ui-monospace, Menlo, monospace; }
  .chip .notes { display:block; font-size: 10px; color: var(--accent); margin-top: 2px;
    font-family: ui-monospace, Menlo, monospace; letter-spacing: .5px; }
  .tip { position: fixed; z-index: 70; background: var(--header); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 12px;
    box-shadow: 0 8px 22px var(--shadow); pointer-events: none; display: none; text-align: center;
    font-family: ui-monospace, Menlo, monospace; }
  .tip.show { display: block; }
  .tip .tiprow { white-space: nowrap; margin-bottom: 6px; }
  .tip .tnotes { font-weight: 700; color: var(--accent); }
  .tip .tname { color: var(--muted); margin-right: 6px; }
  .piano { display: block; }
  .tip .piano { margin: 0 auto; }
  .pop .piano { margin: 0 auto; }
  .fn-tonic .sym { color: var(--fn-tonic); }
  .fn-sub   .sym { color: var(--fn-sub); }
  .fn-dom   .sym { color: var(--fn-dom); }
  .fn-chrom .sym { color: var(--fn-chrom); }
  .fn-unknown .sym { color: var(--fn-unknown); }
  /* linting: unrecognized chord */
  .chip.err .sym { color: var(--fn-dom);
    text-decoration: underline wavy var(--fn-dom); text-underline-offset: 3px; }
  .chip.err .rn { color: var(--fn-dom); }
  .chip.lbl .sym { color: var(--muted); font-weight: 600; }
  .bar-txt { color: var(--muted); font-style: italic; font-size: 13px; align-self: center; padding: 2px 4px; }
  #lintStatus { color: var(--fn-dom); font-size: 11px; text-transform: none; letter-spacing: 0; }
  .save-status { color: var(--muted); font-size: 11px; text-transform: none; letter-spacing: 0; }
  .save-status.editing { color: var(--accent); }

  /* lyric lines */
  .lyric-line { display: flex; flex-wrap: wrap; align-items: flex-end;
    margin: 6px 0; row-gap: 4px; }
  .lyseg { display: inline-flex; flex-direction: column; align-items: flex-start; }
  .lyseg .chip { padding: 0 2px; text-align: left; }
  .lyseg .chip .sym { font-size: 14px; }
  .lyseg .ly { color: var(--lyric); font-size: 16px; white-space: pre; min-height: 1.2em; }
  .lyseg.nochord .ly { padding-top: 0; }
  .lyseg.nochord { padding-top: 18px; }
  .plain-lyric { color: var(--lyric); font-size: 16px; margin: 6px 0; }

  .legend { display:flex; gap:16px; flex-wrap:wrap; margin-top: 30px;
    padding-top:14px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:3px;
    margin-right:5px; vertical-align:middle; }

  /* ---- popover (substitutions) ---- */
  .pop {
    position: fixed; z-index: 50; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 12px 34px var(--shadow); min-width: 220px;
    padding: 6px; font-size: 13px; display: none;
    max-height: calc(100vh - 24px); overflow-y: auto;
  }
  .pop.show { display: block; }
  .pop .pop-h { font-size: 11px; color: var(--muted); padding: 6px 8px 4px;
    text-transform: uppercase; letter-spacing: 1px; }
  .pop .opt { display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 7px 8px; border-radius: 7px; cursor: pointer; }
  .pop .opt:hover { background: var(--sel); }
  .pop .opt .o-sym { font-family: ui-monospace, Menlo, monospace; font-weight: 700; }
  .pop .opt .o-lbl { color: var(--muted); font-size: 11px; }
  .pop .sep { height:1px; background: var(--line); margin: 4px 2px; }

  /* ---- command palette ---- */
  .palette-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; }
  .palette-bg.show { display: block; }
  .palette { position: absolute; top: 14%; left: 50%; transform: translateX(-50%);
    width: 520px; max-width: 92vw; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; box-shadow: 0 20px 60px var(--shadow); overflow: hidden; }
  .palette input { width: 100%; border: 0; background: transparent; color: var(--text);
    font-size: 15px; padding: 14px 16px; outline: none; border-bottom: 1px solid var(--line); }
  .palette .cmds { max-height: 320px; overflow: auto; padding: 6px; }
  .palette .cmd { display: flex; justify-content: space-between; align-items: center;
    padding: 9px 12px; border-radius: 8px; cursor: pointer; }
  .palette .cmd.active, .palette .cmd:hover { background: var(--sel); }
  .palette .cmd .c-desc { color: var(--muted); font-size: 11px; }

  /* ---- autocomplete ---- */
  .ac { position: fixed; z-index: 60; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; box-shadow: 0 8px 22px var(--shadow); padding: 4px; display: none;
    font-family: ui-monospace, Menlo, monospace; font-size: 13px; min-width: 150px; }
  .ac.show { display: block; }
  .ac .ai { padding: 5px 9px; border-radius: 6px; cursor: pointer; display:flex; justify-content:space-between; gap:14px; }
  .ac .ai.active { background: var(--sel); }
  .ac .ai .hint { color: var(--muted); font-size: 11px; }
  .ac .ai-head { padding: 4px 9px 5px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .8px; color: var(--accent); border-bottom: 1px solid var(--line);
    margin-bottom: 3px; font-family: ui-sans-serif, system-ui, sans-serif; }
  .mirror { position: absolute; visibility: hidden; white-space: pre-wrap; word-wrap: break-word;
    top: 0; left: 0; pointer-events: none; }

  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border:1px solid var(--line); color: var(--text);
    padding: 9px 16px; border-radius: 9px; font-size: 13px; box-shadow: 0 8px 24px var(--shadow);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  /* ---- print: only the rendered chart, keep colors ---- */
  @media print {
    .topbar, .pane.editor, .divider, .pane-head, .pop, .tip, .ac, .palette-bg,
    .toast, #exportPop { display: none !important; }
    .main { display: block; height: auto; }
    .pane.preview { width: 100%; background: #fff; }
    body, .app, .pane.preview { height: auto; overflow: visible; }
    .preview-scroll { overflow: visible; padding: 0; }
    .chip { break-inside: avoid; }
    .bar-row, .lyric-line { break-inside: avoid; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Musii<span class="dot">·</span>code</div>
    <div class="pill" id="keyPill">Key <b id="keyLabel">C</b></div>
    <div class="pill" id="bpmPill" title="Set tempo (BPM)">♩ <b id="bpmLabel">—</b></div>
    <div class="pill" id="downBtn" title="Transpose down a semitone">▼ −1</div>
    <div class="pill" id="upBtn" title="Transpose up a semitone">▲ +1</div>
    <div class="spacer"></div>
    <div class="pill" id="paletteBtn">⌘ Commands <span class="kbd">⌘K</span></div>
    <div class="pill" id="exportBtn" title="Export Markdown or print to PDF">⤓ Export</div>
    <div class="pill" id="notesBtn" title="Show the notes inside every chord">♪ Notes</div>
    <div class="pill" id="themeBtn">◐ Theme</div>
  </div>

  <div class="main">
    <div class="pane editor">
      <div class="pane-head">Source
        <span id="saveStatus" class="save-status"></span>
        <span class="spacer"></span>
        <a id="newBtn">new</a>
        <a id="openBtn">open</a>
        <a id="helpBtn">syntax help</a>
      </div>
      <div class="editor-wrap">
        <textarea id="src" spellcheck="false" autocomplete="off"></textarea>
        <div class="mirror" id="mirror"></div>
      </div>
    </div>
    <div class="divider" id="divider" title="Drag to resize · double-click to reset"></div>
    <div class="pane preview">
      <div class="pane-head">Preview
        <span class="spacer"></span>
        <span id="lintStatus"></span>
        <span style="color:var(--muted)">click any chord for substitutions</span>
      </div>
      <div class="preview-scroll" id="preview"></div>
    </div>
  </div>
</div>

<div class="pop" id="pop"></div>
<div class="pop" id="exportPop"></div>
<div class="pop" id="themePop"></div>
<div class="tip" id="tip"></div>
<div class="ac" id="ac"></div>
<div class="palette-bg" id="paletteBg">
  <div class="palette">
    <input id="palInput" placeholder="Type a command…  (transpose, key, theme, substitute…)" />
    <div class="cmds" id="palCmds"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MUSIICODE — music theory engine
   ============================================================ */
const SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const NOTE_PC = { 'C':0,'D':2,'E':4,'F':5,'G':7,'A':9,'B':11 };
const FLAT_KEYS = new Set(['F','Bb','Eb','Ab','Db','Gb','Cb','Dm','Gm','Cm','Fm','Bbm','Ebm','Abm']);

function noteToPc(name){
  const m = /^([A-Ga-g])([#b]?)/.exec(name);
  if(!m) return null;
  let pc = NOTE_PC[m[1].toUpperCase()];
  if(m[2]==='#') pc = (pc+1)%12;
  if(m[2]==='b') pc = (pc+11)%12;
  return pc;
}
function pcToName(pc, useFlats){ return (useFlats?FLAT:SHARP)[((pc%12)+12)%12]; }
function keyUsesFlats(keyName){ return FLAT_KEYS.has(keyName) || /b/.test(keyName); }

/* ---- chord parsing ----
   returns {root, rootName, quality, bass, bassPc, valid, info} */
function parseChord(sym){
  if(!sym) return {valid:false};
  let s = sym.trim();
  const m = /^([A-Ga-g])([#b]?)(.*)$/.exec(s);
  if(!m) return {valid:false, raw:sym};
  const rootName = m[1].toUpperCase()+m[2];
  const root = noteToPc(rootName);
  let rest = m[3];
  let bass=null, bassPc=null;
  const slash = rest.indexOf('/');
  if(slash>=0){
    const b = rest.slice(slash+1);
    rest = rest.slice(0,slash);
    bassPc = noteToPc(b);
    if(bassPc!=null) bass = b.charAt(0).toUpperCase()+b.slice(1);
  }
  const qualityOk = QUALITY_RE.test(rest.replace(/[()\s]/g,''));
  return {valid: root!=null && qualityOk, raw:sym, root, rootName, quality:rest, bass, bassPc,
          info: qualityInfo(rest)};
}
/* a permissive grammar for chord-quality strings — rejects gibberish like "mja7" */
const QUALITY_RE = /^(?:m|min|maj|ma|M|-|dim|o|°|aug|\+|ø)?(?:maj13|maj11|maj9|maj7|M7|Δ7?|6\/9|13|11|9|7|6|5|4|2)?(?:sus[24]?)?(?:add(?:2|4|6|9|11|13))?(?:alt)?(?:(?:b5|#5|b9|#9|#11|b13|b6|#4)+)?$/i;

/* classify a quality string into triad type + flags */
function qualityInfo(q){
  const x = q.toLowerCase();
  const isMaj7tag = /maj7|maj9|maj13|△|ma7/.test(x);
  let triad='major', dominant=false;
  let dim = /dim|°|o(?![a-z])/.test(x);
  let halfDim = /m7b5|ø|m7-5/.test(x);
  let aug = /aug|\+|#5/.test(x);
  let sus = /sus/.test(x);
  let minor = (/^m(?!aj)/.test(x) || /^-/.test(x) || /^min/.test(x)) && !halfDim;
  if(halfDim){ triad='dim'; }
  else if(dim){ triad='dim'; }
  else if(aug){ triad='aug'; }
  else if(minor){ triad='minor'; }
  else { triad='major'; }
  // dominant = has a 7/9/11/13 but not maj7, and major-ish third
  if(!isMaj7tag && /(7|9|11|13)/.test(x) && (triad==='major') && !sus) dominant=true;
  if(!isMaj7tag && /(7|9|11|13)/.test(x) && sus) dominant=true; // sus7 ~ dominant function
  return {triad, dominant, halfDim, dim, aug, sus, maj7:isMaj7tag, minor};
}

/* ---- scale / diatonic ---- */
const MAJOR_STEPS = [0,2,4,5,7,9,11];
const MAJOR_QUAL  = ['','m','m','','','m','dim'];
const RN_BASE     = ['I','ii','iii','IV','V','vi','vii'];
// natural minor
const MINOR_STEPS = [0,2,3,5,7,8,10];
const MINOR_QUAL  = ['m','dim','','m','m','','']; // i ii° III iv v VI VII
const RN_BASE_MIN = ['i','ii','III','iv','v','VI','VII'];
const NUMERALS    = ['I','II','III','IV','V','VI','VII'];

/* next-chord transition tendencies (self-authored from common functional harmony,
   NOT Hooktheory data). rows index by scale degree 0=I..6=vii; values [toDegree, weight]. */
const MAJOR_TRANS = {
  0: [[3,22],[4,22],[5,20],[1,16],[2,8],[0,7],[6,5]],   // I
  1: [[4,50],[6,12],[3,12],[0,10],[5,8],[1,8]],          // ii
  2: [[5,38],[3,26],[0,14],[1,12],[4,10]],               // iii
  3: [[4,34],[0,26],[1,16],[5,12],[2,6],[6,6]],          // IV
  4: [[0,52],[5,22],[3,12],[1,8],[2,6]],                 // V
  5: [[3,30],[1,24],[4,18],[0,14],[2,8],[6,6]],          // vi
  6: [[0,60],[2,20],[5,12],[4,8]]                        // vii°
};
const MINOR_TRANS = {
  0: [[5,24],[3,22],[6,18],[4,16],[2,12],[0,8]],         // i
  1: [[4,55],[0,20],[6,15],[3,10]],                      // ii°
  2: [[5,34],[6,26],[3,18],[0,12],[4,10]],               // III
  3: [[0,34],[4,24],[6,16],[5,14],[2,12]],               // iv
  4: [[0,50],[5,22],[6,16],[3,12]],                      // v / V
  5: [[3,28],[6,24],[2,20],[0,16],[4,12]],               // VI
  6: [[2,40],[0,24],[5,20],[3,16]]                       // VII
};
/* given the previous chord symbol and key context, rank likely next chords */
function nextChordSuggestions(prevSym, ctx){
  const steps = ctx.minor ? MINOR_STEPS : MAJOR_STEPS;
  const table = ctx.minor ? MINOR_TRANS : MAJOR_TRANS;
  const rnames = ctx.minor ? RN_BASE_MIN : RN_BASE;
  let fromIdx = null;
  if(prevSym){ const c = parseChord(prevSym); if(c.valid){ fromIdx = steps.indexOf(((c.root-ctx.keyPc)+12)%12); } }
  const rows = (fromIdx!=null && fromIdx>=0) ? table[fromIdx] : [[0,55],[5,25],[3,20]]; // openers if none
  const total = rows.reduce((s,r)=>s+r[1],0);
  return rows.map(([toIdx,w])=>({
      sym: diatonicChord(ctx.keyPc, toIdx, ctx.useFlats, ctx.minor),
      rn: rnames[toIdx],
      pct: Math.round(w/total*100)
    })).sort((a,b)=>b.pct-a.pct).slice(0,6);
}
/* key in effect at a given source line (scans key: directives above it) */
function activeKeyAt(text, lineIdx){
  let kp=0, min=false, fl=keyUsesFlats('C');
  const ls = text.split('\n');
  for(let i=0;i<=lineIdx && i<ls.length;i++){
    const d = /^\s*key\s*:\s*(.+)$/i.exec(ls[i]);
    if(d){ const pk=parseKey(d[1].trim()); kp=pk.pc ?? 0; min=pk.minor; fl=keyUsesFlats(d[1].trim()); }
  }
  return { keyPc:kp, minor:min, useFlats:fl };
}

/* ---- Roman-numeral input: "V7", "ii", "bVII", "vii°" -> real chord in the key ---- */
const ROMAN_DEG = { i:1, ii:2, iii:3, iv:4, v:5, vi:6, vii:7 };
function romanToChord(tok, ctx){
  const m = /^([b#]?)([ivIV]+)(.*)$/.exec(tok);
  if(!m) return null;
  const numLower = m[2].toLowerCase();
  if(!(numLower in ROMAN_DEG)) return null;
  const rest = m[3];
  const restClean = rest.replace(/[()\s]/g,'');
  const okRest = restClean==='' || /^(°|o(?![a-z])|ø|\+)/.test(restClean) || QUALITY_RE.test(restClean);
  if(!okRest) return null;
  const deg = ROMAN_DEG[numLower];
  const upper = m[2] === m[2].toUpperCase();
  const acc = m[1];
  const steps = ctx.minor ? MINOR_STEPS : MAJOR_STEPS;
  const semi = steps[deg-1] + (acc==='b'?-1 : acc==='#'?1 : 0);
  const spell = acc==='b' ? true : acc==='#' ? false : ctx.useFlats;  // bVII -> Bb, #IV -> F#
  const root = pcToName((((ctx.keyPc + semi)%12)+12)%12, spell);
  let qual;
  if(/^(°|o(?![a-z]))/.test(rest)) qual = 'dim' + rest.replace(/^(°|o)/,'');
  else if(/^ø/.test(rest)) qual = 'm7b5' + rest.slice(1);
  else qual = (upper?'':'m') + rest;
  return root + qual;
}
/* resolve a token to a chord symbol: literal chord OR roman numeral, else null */
function resolveChordToken(tok, ctx){
  if(parseChord(tok).valid) return tok;
  return romanToChord(tok, ctx);
}

/* ---- reharmonize: live transform of a chord (jazz / simple / tritone) ---- */
const DIA7_MAJ = ['maj7','m7','m7','maj7','7','m7','m7b5'];
const DIA7_MIN = ['m7','m7b5','maj7','m7','m7','maj7','7'];
function parseReharm(s){
  s = (s||'').toLowerCase();
  if(s.startsWith('simp')) return 'simple';
  if(s.startsWith('tri')) return 'tritone';
  return 'jazz';
}
function reharmonizeSym(sym, ctx, mode){
  const c = parseChord(sym);
  if(!c.valid) return sym;
  const bass = c.bass!=null ? '/'+c.bass : '';
  if(mode==='simple'){
    let q = c.info.halfDim||c.info.dim ? 'dim' : c.info.aug ? 'aug' : c.info.triad==='minor' ? 'm' : '';
    return c.rootName + q + bass;
  }
  if(mode==='tritone'){
    return c.info.dominant ? pcToName((c.root+6)%12, ctx.useFlats)+'7'+bass : sym;
  }
  // jazz: add a diatonic 7th if the chord has no extension yet
  if(/(6|7|9|11|13)/.test(c.quality)) return sym;
  const deg = (ctx.minor?MINOR_STEPS:MAJOR_STEPS).indexOf(((c.root-ctx.keyPc)+12)%12);
  if(deg>=0) return c.rootName + (ctx.minor?DIA7_MIN:DIA7_MAJ)[deg] + bass;
  const q = c.info.triad==='minor' ? 'm7' : c.info.dim ? 'm7b5' : 'maj7';
  return c.rootName + q + bass;
}

function diatonicChord(keyPc, degIndex, useFlats, minor){
  const steps = minor ? MINOR_STEPS : MAJOR_STEPS;
  const qual  = minor ? MINOR_QUAL  : MAJOR_QUAL;
  const pc = (keyPc + steps[degIndex])%12;
  return pcToName(pc, useFlats) + qual[degIndex];
}

/* parse a key directive like "C", "Am", "F#m", "Bb minor" -> {pc, minor, root} */
function parseKey(s){
  const m = /^\s*([A-Ga-g][#b]?)\s*(m|min|minor|-)?\s*$/i.exec(s||'');
  if(!m) return {pc:0, minor:false, root:'C'};
  const root = m[1][0].toUpperCase() + m[1].slice(1);
  return {pc: noteToPc(root), minor: !!m[2], root};
}

/* shared: build a roman numeral string, cased by the chord's actual quality */
function caseRn(base, info){
  let r = (info.triad==='minor' || info.triad==='dim') ? base.toLowerCase() : base.toUpperCase();
  if(info.dim && !info.halfDim) r += '°';
  if(info.halfDim) r += 'ø';
  if(info.aug) r += '+';
  if(info.maj7) r += 'maj7';
  else if(info.dominant) r += '7';
  return r;
}

/* analyze a chord in a key -> {roman, fn}; fn in tonic/sub/dom/chrom/unknown */
function analyze(chord, keyPc, minor){
  if(!chord.valid) return {roman:'?', fn:'unknown'};
  const deg = ((chord.root - keyPc)+12)%12;
  const info = chord.info;

  if(minor){
    const idx = MINOR_STEPS.indexOf(deg);
    if(idx>=0){
      let fn;
      if(idx===0||idx===2||idx===5) fn='tonic';   // i  III  VI
      else if(idx===1||idx===3)      fn='sub';     // ii° iv
      else                            fn='dom';     // v   VII
      if(info.dominant && idx!==4) fn='dom';        // applied dominant
      return {roman: caseRn(RN_BASE_MIN[idx], info), fn};
    }
    // raised leading-tone harmony (harmonic minor): V or vii° on the natural 7
    if(deg===11) return {roman: caseRn(info.dim||info.halfDim ? 'vii' : 'VII', info), fn:'dom'};
    return chromatic(deg, info, true);
  }

  const idx = MAJOR_STEPS.indexOf(deg);
  if(idx>=0){
    let fn;
    if(idx===0||idx===2||idx===5) fn='tonic';
    else if(idx===1||idx===3)      fn='sub';
    else                            fn='dom';
    if(info.dominant && idx!==4) fn='dom';          // applied/secondary dominant
    return {roman: caseRn(RN_BASE[idx], info), fn};
  }
  return chromatic(deg, info, false);
}
/* spell a non-diatonic (chromatic) chord relative to the key */
function chromatic(deg, info, minor){
  const names = ['I','bII','II','bIII','III','IV','#IV','V','bVI','VI','bVII','VII'];
  let r = names[deg] || '?';
  r = (info.triad==='minor'||info.triad==='dim') ? r.toLowerCase() : r.toUpperCase();
  if(info.dim && !info.halfDim) r+='°';
  if(info.halfDim) r+='ø';
  if(info.aug) r+='+';
  if(info.maj7) r+='maj7'; else if(info.dominant) r+='7';
  return {roman:r, fn: info.dominant ? 'dom' : 'chrom'};
}

/* ---- transposition of a single chord symbol ---- */
function transposeSymbol(sym, interval, useFlats){
  const c = parseChord(sym);
  if(!c.valid) return sym;
  const newRoot = pcToName((c.root+interval)%12, useFlats);
  let out = newRoot + c.quality;
  if(c.bass!=null) out += '/' + pcToName((c.bassPc+interval)%12, useFlats);
  return out;
}

/* ---- chord tones: spell the notes that make up a chord ----
   returns array of note names (root first), respecting key/root spelling */
function getChordTones(chord){
  if(!chord || !chord.valid) return [];
  const q = chord.quality.toLowerCase();
  const info = chord.info;
  // collect {deg, semi} chord tones in musical stacking order (root,3,5,7,9,11,13)
  const tones = [];
  const add = (deg, semi) => { if(!tones.some(t=>t.deg===deg)) tones.push({deg, semi}); };
  add(1, 0); // root
  // third (or suspension)
  if(info.sus){ /sus2/.test(q) ? add(2,2) : add(4,5); }
  else if(info.triad==='minor' || info.triad==='dim') add(3,3);
  else add(3,4);
  // fifth
  if(info.dim || info.halfDim) add(5,6);
  else if(info.aug || /#5/.test(q)) add(5,8);
  else if(/b5/.test(q)) add(5,6);
  else add(5,7);
  // sixth / seventh
  const isDim7 = info.dim && !info.halfDim && /(?:dim)?7/.test(q);
  if(isDim7) add(7,9);                         // diminished 7th (bb7)
  else if(info.halfDim) add(7,10);             // m7b5
  else if(info.maj7) add(7,11);                // major 7th
  else if(/(?:^|[^b#0-9])6/.test(q)) add(6,9); // 6 / 6-9 chord
  else if(/7|9|11|13/.test(q)) add(7,10);      // dominant / minor 7th
  // upper extensions
  if(/9|add9/.test(q)) add(9, /b9/.test(q)?1 : (/#9/.test(q)?3:2));
  if(/11/.test(q)) add(11, /#11/.test(q)?6:5);
  if(/13/.test(q)) add(13, /b13/.test(q)?8:9);
  return tones.map(t => ({deg:t.deg, semi:t.semi, name: spellTone(chord.rootName, chord.root, t.deg, t.semi)}));
}
function getChordNotes(chord){ return getChordTones(chord).map(t => t.name); }
/* spell a chord tone on its correct scale-letter so 7ths/9ths read right (Bb not A#) */
const LETTERS = ['C','D','E','F','G','A','B'];
function spellTone(rootName, rootPc, deg, semi){
  const rli = LETTERS.indexOf(rootName[0].toUpperCase());
  const letter = LETTERS[(rli + (deg-1)) % 7];
  const naturalPc = NOTE_PC[letter];
  const target = (rootPc + semi) % 12;
  let delta = ((target - naturalPc) % 12 + 12) % 12;
  if(delta > 6) delta -= 12;
  const acc = ({'-2':'bb','-1':'b','0':'','1':'#','2':'##'})[delta] ?? '';
  return letter + acc;
}

/* ---- piano diagram: render a 2-octave keyboard with chord tones lit ----
   keys are placed at (root + interval) so the chord climbs the keyboard as its real shape */
function pianoSVG(chord){
  const tones = getChordTones(chord);
  if(!tones.length) return '';
  const rootPc = chord.root;
  const lit = {}; // absolute semitone (0..23) -> 'root' | 'tone'
  tones.forEach(t => { lit[rootPc + t.semi] = (t.semi===0 ? 'root' : 'tone'); });
  const w=18, h=78, bw=11, bh=48;
  const whiteSemis=[0,2,4,5,7,9,11];
  const blackBoundary={1:1, 3:2, 6:4, 8:5, 10:6}; // white index of right neighbour, per octave
  const fillFor = st => st==='root' ? 'var(--caret)' : st==='tone' ? 'var(--accent)' : null;
  let whites='', blacks='';
  for(let oct=0; oct<2; oct++){
    whiteSemis.forEach((n, wi)=>{
      const s=oct*12+n, x=(oct*7+wi)*w, st=lit[s];
      whites += `<rect x="${x}" y="0" width="${w}" height="${h}" rx="2.5" fill="${fillFor(st)||'#fafafa'}" stroke="#8a8a8a" stroke-width="1"/>`;
    });
  }
  for(let oct=0; oct<2; oct++){
    for(const nn in blackBoundary){
      const n=+nn, s=oct*12+n, x=(oct*7+blackBoundary[n])*w - bw/2, st=lit[s];
      blacks += `<rect x="${x}" y="0" width="${bw}" height="${bh}" rx="1.5" fill="${fillFor(st)||'#1b1b1b'}" stroke="#000" stroke-width="0.6"/>`;
    }
  }
  const W=14*w;
  return `<svg class="piano" viewBox="0 0 ${W} ${h}" width="${W}" height="${h}" xmlns="http://www.w3.org/2000/svg">${whites}${blacks}</svg>`;
}

/* ============================================================
   SUBSTITUTIONS
   ============================================================ */
function getSubstitutions(chord, keyPc, useFlats, minor){
  if(!chord || !chord.valid) return [];
  const out = [];
  const seen = new Set();
  const push = (sym, label)=>{ if(sym && sym!==chord.raw.trim() && !seen.has(sym)){ seen.add(sym); out.push({sym,label}); } };
  const info = chord.info;
  const root = chord.root;

  // tritone substitution for dominant chords
  if(info.dominant){
    push(pcToName((root+6)%12,useFlats)+'7', 'Tritone sub');
  }
  // relative major/minor
  if(info.triad==='major' && !info.dominant){
    push(pcToName((root+9)%12,useFlats)+'m7', 'Relative minor');
    if(!info.maj7) push(chord.rootName+'maj7','Add maj7');
    push(chord.rootName+'6','Add 6th');
  }
  if(info.triad==='minor'){
    push(pcToName((root+3)%12,useFlats), 'Relative major');
    if(!/7/.test(chord.quality)) push(chord.rootName+'m7','Add 7th');
    push(chord.rootName+'m9','Add 9th');
  }
  if(info.dominant){
    if(!/9|13/.test(chord.quality)) push(chord.rootName+'9','Extend to 9');
    push(chord.rootName+'13','Extend to 13');
    push(chord.rootName+'7sus4','Suspend (7sus4)');
  }

  // same-function diatonic swaps (respects major / minor)
  const steps = minor ? MINOR_STEPS : MAJOR_STEPS;
  const rnames = minor ? RN_BASE_MIN : RN_BASE;
  const deg = ((root - keyPc)+12)%12;
  const idx = steps.indexOf(deg);
  if(idx>=0){
    const group = (idx===0||idx===2||idx===5)?[0,2,5]
                : (idx===1||idx===3)?[1,3]
                : [4,6];
    group.filter(g=>g!==idx).forEach(g=>{
      push(diatonicChord(keyPc,g,useFlats,minor), 'Same function ('+rnames[g]+')');
    });
  }

  // secondary dominant of this chord  (V7 / X)
  push(pcToName((root+7)%12,useFlats)+'7', 'Secondary dom (V7/'+ (idx>=0?rnames[idx]:'x') +')');

  // tonic-specific colour: borrowing / Picardy
  if(idx===0 && !minor){
    push(pcToName((keyPc+10)%12,useFlats),'Borrowed bVII');
    push(pcToName((keyPc+5)%12,useFlats)+'m','Borrowed iv');
    push(pcToName((keyPc+8)%12,useFlats),'Borrowed bVI');
  }
  if(idx===0 && minor){
    push(chord.rootName, 'Picardy 3rd (major tonic)');
    push(pcToName((keyPc+7)%12,useFlats)+'7','Harmonic-minor V7');
  }
  return out.slice(0,9);
}

/* ============================================================
   DOCUMENT PARSING
   line types: directive | section | bars | lyric | blank | plain
   each chord token tracked with {line, start, end} for editing
   ============================================================ */
function parseDoc(text){
  const lines = text.split('\n');
  const doc = { title:'', key:'C', time:'4/4', bpm:'', keyPc:0, minor:false, useFlats:false, blocks:[] };
  // pre-pass: collect named-progression definitions ("name = | ... |")
  const defs = {};
  lines.forEach((l,i)=>{
    const dm = /^(\s*([A-Za-z][\w-]*)\s*=\s*)(.+)$/.exec(l);
    if(dm && dm[3].includes('|')) defs[dm[2].toLowerCase()] = { value:dm[3].replace(/\s+$/,''), line:i, offset:dm[1].length };
  });
  // running state — key/tempo apply from where they appear downward
  let curKey='C', curKeyPc=0, curMinor=false, curFlats=false, curBpm='';
  let seenKey=false, seenBpm=false, seenTitle=false, seenTime=false;
  const ctx = ()=>({ keyPc:curKeyPc, minor:curMinor, useFlats:curFlats });
  const isChordLine = s=>{ const t=s.trim().split(/\s+/).filter(Boolean); return t.length>0 && t.every(x=>!!resolveChordToken(x, ctx())); };
  lines.forEach((raw, li)=>{
    const line0 = raw.replace(/\s+$/,'');
    // full-line comment
    if(/^\s*\/\//.test(line0)){ doc.blocks.push({type:'comment', text:line0, line:li, ...ctx()}); return; }
    // strip trailing inline comment ( // ... )
    let line = line0;
    const cm = line.match(/\s+\/\/.*$/);
    if(cm) line = line.slice(0, cm.index).replace(/\s+$/,'');
    if(line.trim()===''){ doc.blocks.push({type:'blank', line:li, ...ctx()}); return; }

    const dir = /^\s*(title|key|time|bpm|tempo)\s*:\s*(.+)$/i.exec(line);
    if(dir){
      const k = dir[1].toLowerCase(), v = dir[2].trim();
      let dkind=k, isChange=false, display=v;
      if(k==='title'){ if(!seenTitle){ doc.title=v; seenTitle=true; } }
      else if(k==='time'){ if(!seenTime){ doc.time=v; seenTime=true; } }
      else if(k==='key'){
        const pk = parseKey(v);
        curKey=v; curKeyPc=pk.pc ?? 0; curMinor=pk.minor; curFlats=keyUsesFlats(v);
        if(!seenKey){ doc.key=v; doc.keyPc=curKeyPc; doc.minor=curMinor; doc.useFlats=curFlats; seenKey=true; }
        else isChange=true;
      }
      else { // bpm / tempo
        const val = v.replace(/[^\d.]/g,''); curBpm=val; display=val; dkind='bpm';
        if(!seenBpm){ doc.bpm=val; seenBpm=true; } else isChange=true;
      }
      doc.blocks.push({type:'directive', line:li, dkind, value:display, isChange, ...ctx()});
      return;
    }
    if(/^\s*#/.test(line)){
      doc.blocks.push({type:'section', text: line.replace(/^\s*#+\s*/,''), line:li, ...ctx()});
      return;
    }
    // named-progression definition:  name = | ... |
    const defm = /^(\s*([A-Za-z][\w-]*)\s*=\s*)(.+)$/.exec(line);
    if(defm && defm[3].includes('|')){
      doc.blocks.push({type:'named', name:defm[2], bars: tokenizeBars(defm[3], li, ctx(), null, defm[1].length), line:li, ...ctx()});
      return;
    }
    // reference:  @name
    const refm = /^\s*@([A-Za-z][\w-]*)\s*$/.exec(line);
    if(refm){
      const d = defs[refm[1].toLowerCase()];
      doc.blocks.push(d
        ? {type:'named', name:refm[1], ref:true, bars: tokenizeBars(d.value, d.line, ctx(), null, d.offset), line:li, ...ctx()}
        : {type:'named', name:refm[1], ref:true, missing:true, line:li, ...ctx()});
      return;
    }
    if(line.includes('[') && /\[[^\]]+\]/.test(line)){
      doc.blocks.push({type:'lyric', segs: tokenizeLyric(line, li, ctx(), null), line:li, ...ctx()});
      return;
    }
    // optional reharmonize operator (~jazz / ~simple / ~tritone) on a chord line
    let reharm=null, body=line;
    const rhm = /\s*~(\w*)\s*$/.exec(line);
    if(rhm){
      const cand = line.slice(0, rhm.index);
      if(cand.includes('|') || isChordLine(cand)){ reharm = parseReharm(rhm[1]); body = cand.replace(/\s+$/,''); }
    }
    if(body.includes('|')){
      doc.blocks.push({type:'bars', bars: tokenizeBars(body, li, ctx(), reharm, 0), reharm, line:li, ...ctx()});
      return;
    }
    if(isChordLine(body)){
      doc.blocks.push({type:'bars', bars:[{ chords: tokenizeBarChords(body, li, 0, ctx(), reharm) }], reharm, line:li, ...ctx()});
      return;
    }
    doc.blocks.push({type:'plain', text:line, line:li, ...ctx()});
  });
  return doc;
}

function tokenizeBarChords(text, li, offset, ctx, reharm){
  const chords=[]; const re=/\S+/g; let m;
  while((m=re.exec(text))){
    if(m[0]==='|') continue;
    const raw=m[0], start=offset+m.index, end=start+raw.length;
    const resolved = ctx ? resolveChordToken(raw, ctx) : (parseChord(raw).valid ? raw : null);
    if(resolved){
      const disp = (reharm && ctx) ? reharmonizeSym(resolved, ctx, reharm) : resolved;
      chords.push({ sym:disp, src:raw, start, end, line:li, chord:parseChord(disp), kind:'chord' });
    } else if(/^[A-Ga-g]/.test(raw)){
      chords.push({ sym:raw, src:raw, start, end, line:li, chord:parseChord(raw), kind:'error' });
    } else {
      chords.push({ sym:raw, src:raw, start, end, line:li, chord:parseChord(raw), kind:'text' });
    }
  }
  return chords;
}
function tokenizeBars(line, li, ctx, reharm, base){
  const bars=[]; const parts=line.split('|'); let cursor=base||0;
  parts.forEach((p,i)=>{
    const startIdx = cursor;
    cursor += p.length + 1; // +1 for the '|'
    if(p.trim()==='' && (i===0 || i===parts.length-1)) return;
    if(p.trim()==='') { bars.push({chords:[]}); return; }
    bars.push({ chords: tokenizeBarChords(p, li, startIdx, ctx, reharm) });
  });
  return bars;
}
function tokenizeLyric(line, li, ctx, reharm){
  const segs=[]; const re=/\[([^\]]+)\]/g; let m;
  let idx=0;
  const tokens=[];
  while((m=re.exec(line))){
    const before = line.slice(idx, m.index);
    tokens.push({type:'text', text:before});
    const rawc=m[1];
    const resolved = ctx ? resolveChordToken(rawc, ctx) : (parseChord(rawc).valid ? rawc : null);
    const disp = resolved ? ((reharm && ctx) ? reharmonizeSym(resolved, ctx, reharm) : resolved) : rawc;
    tokens.push({type:'chord', sym:disp, src:rawc, start:m.index+1, end:m.index+1+rawc.length, chord:parseChord(disp), line:li});
    idx = re.lastIndex;
  }
  tokens.push({type:'text', text: line.slice(idx)});
  // assemble segments: each chord starts a segment that owns following text
  let cur=null;
  // leading text with no chord
  if(tokens.length && tokens[0].type==='text' && tokens[0].text!==''){
    segs.push({chord:null, ly:tokens[0].text});
  }
  for(let i=0;i<tokens.length;i++){
    const t=tokens[i];
    if(t.type==='chord'){
      const next = tokens[i+1];
      const ly = (next && next.type==='text') ? next.text : '';
      segs.push({chord:t, ly});
    }
  }
  return segs;
}

/* ============================================================
   RENDERING
   ============================================================ */
const previewEl = document.getElementById('preview');
let _lintCount = 0;
function chipHtml(tok, ctx){
  const c = tok.chord;
  // embed the key in effect at this chord so the substitution menu uses the right key
  const keyAttrs = `data-kpc="${ctx.keyPc}" data-kmin="${ctx.minor?1:0}" data-flats="${ctx.useFlats?1:0}"`;
  const dataAttrs = `data-line="${tok.line}" data-start="${tok.start}" data-end="${tok.end}" data-sym="${escapeAttr(tok.sym)}" ${keyAttrs}`;
  if(!c.valid){
    if(/^[A-Ga-g]/.test(tok.sym)){           // chord-like but unrecognized -> lint it
      _lintCount++;
      return `<span class="chip err" title="Unrecognized chord — click to fix" ${dataAttrs} data-notes="">`
           + `<span class="sym">${escapeHtml(tok.sym)}</span><span class="rn">?</span></span>`;
    }
    return `<span class="chip lbl" ${dataAttrs} data-notes=""><span class="sym">${escapeHtml(tok.sym)}</span></span>`;
  }
  const a = analyze(c, ctx.keyPc, ctx.minor);
  const notes = getChordNotes(c).join(' ');
  const notesLine = showNotes ? `<span class="notes">${escapeHtml(notes)}</span>` : '';
  return `<span class="chip fn-${a.fn}" ${dataAttrs} data-notes="${escapeAttr(notes)}">`
       + `<span class="sym">${escapeHtml(tok.sym)}</span><span class="rn">${escapeHtml(a.roman)}</span>${notesLine}</span>`;
}
function barRowHtml(bars, ctx){
  let h = `<div class="bar-row">`;
  bars.forEach(bar=>{
    h += `<div class="bar">`;
    if(bar.chords.length===0) h += `<span style="color:var(--muted)">·</span>`;
    bar.chords.forEach(ch=> h += ch.kind==='text'
      ? `<span class="bar-txt">${escapeHtml(ch.sym)}</span>`
      : chipHtml(ch, ctx));
    h += `</div>`;
  });
  return h + `</div>`;
}
function render(doc){
  _lintCount = 0;
  let html='';
  if(doc.title) html += `<h1 class="doc-title">${escapeHtml(doc.title)}</h1>`;
  html += `<div class="doc-meta"><span>Key <b>${escapeHtml(doc.key)}${doc.minor?' minor':''}</b></span>`
        + `<span>Time <b>${escapeHtml(doc.time)}</b></span>`
        + (doc.bpm ? `<span>♩ = <b>${escapeHtml(doc.bpm)}</b></span>` : '')
        + `</div>`;
  doc.blocks.forEach(b=>{
    const ctx = { keyPc:b.keyPc, minor:b.minor, useFlats:b.useFlats };
    if(b.type==='directive'){
      if(b.isChange && b.dkind==='key')
        html += `<div class="change-badge key">→ Key <b>${escapeHtml(b.value)}</b></div>`;
      else if(b.isChange && b.dkind==='bpm')
        html += `<div class="change-badge bpm">→ ♩ = <b>${escapeHtml(b.value)}</b></div>`;
    }
    else if(b.type==='comment') { /* non-rendering annotation */ }
    else if(b.type==='section') html += `<div class="section-h">${escapeHtml(b.text)}</div>`;
    else if(b.type==='named'){
      const tag = b.ref ? '@'+b.name : b.name;
      html += `<div class="named-label">${escapeHtml(tag)}</div>`;
      if(b.missing) html += `<div class="named-missing">undefined progression "${escapeHtml(b.name)}"</div>`;
      else html += barRowHtml(b.bars, ctx);
    }
    else if(b.type==='bars'){
      html += barRowHtml(b.bars, ctx);
      if(b.reharm) html += `<div class="reharm-tag">~${escapeHtml(b.reharm)}</div>`;
    }
    else if(b.type==='lyric'){
      html += `<div class="lyric-line">`;
      b.segs.forEach(seg=>{
        if(seg.chord){
          html += `<span class="lyseg">${chipHtml(seg.chord, ctx)}<span class="ly">${escapeHtml(seg.ly)}</span></span>`;
        } else {
          html += `<span class="lyseg nochord"><span class="ly">${escapeHtml(seg.ly)}</span></span>`;
        }
      });
      html += `</div>`;
    }
    else if(b.type==='plain' && b.text.trim()!=='') html += `<div class="plain-lyric">${escapeHtml(b.text)}</div>`;
    else if(b.type==='blank') html += `<div style="height:8px"></div>`;
  });
  html += legendHtml();
  previewEl.innerHTML = html;
  const lint = document.getElementById('lintStatus');
  if(lint) lint.textContent = _lintCount ? `⚠ ${_lintCount} unknown chord${_lintCount>1?'s':''}` : '';
}
function legendHtml(){
  return `<div class="legend">
    <span><i style="background:var(--fn-tonic)"></i>Tonic</span>
    <span><i style="background:var(--fn-sub)"></i>Subdominant</span>
    <span><i style="background:var(--fn-dom)"></i>Dominant</span>
    <span><i style="background:var(--fn-chrom)"></i>Chromatic / borrowed</span>

}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,'&#39;'); }

  const lines = srcEl.value.split('\n');
  let idx = lines.findIndex(l=>/^\s*(bpm|tempo)\s*:/i.test(l));
  const clean = v.replace(/[^\d.]/g,'').trim();
  if(clean===''){ if(idx>=0) lines.splice(idx,1); }
  else if(idx>=0){ lines[idx] = lines[idx].replace(/(:\s*).*/, '$1'+clean); }
  else {
    let last=-1;
    for(let i=0;i<lines.length;i++) if(/^\s*(title|key|time|bpm|tempo)\s*:/i.test(lines[i])) last=i;
    lines.splice(last>=0 ? last+1 : 0, 0, 'bpm: '+clean);

  srcEl.value = lines.join('\n'); refresh();
  toast(clean ? 'Tempo: '+clean+' BPM' : 'Tempo removed');
}

/* ---- bake ~ reharmonizations into the source text ---- */
const CHORD_TOKEN_RE = /[A-Ga-g][^\s|~]*|[b#]?[ivIV]+[^\s|~]*/g;
function applyReharm(){
  const full = srcEl.value, lines = full.split('\n');
  let count = 0;
  const out = lines.map((raw, i)=>{
    const rhm = /\s*~(\w*)\s*$/.exec(raw);
    if(!rhm) return raw;
    const cand = raw.slice(0, rhm.index);
    const ctx = activeKeyAt(full, i);
    const chordish = cand.includes('|') || (cand.trim().split(/\s+/).filter(Boolean).every(t=>!!resolveChordToken(t, ctx)) && cand.trim()!=='');
    if(!chordish) return raw;
    const mode = parseReharm(rhm[1]);
    count++;
    return cand.replace(CHORD_TOKEN_RE, tok=>{
      const r = resolveChordToken(tok, ctx);
      return r ? reharmonizeSym(r, ctx, mode) : tok;
    }).replace(/\s+$/,'');
  });
  if(count){ srcEl.value = out.join('\n'); refresh(); autosave(); toast('Applied reharmonization to '+count+' line'+(count>1?'s':'')); }
  else toast('No ~ lines found');
}

/* ---- convert the whole song between chords and Roman numerals ---- */
function convertDoc(toRoman){
  const full = srcEl.value, lines = full.split('\n');
  const conv = (tok, ctx)=>{
    if(toRoman){
      const c = parseChord(tok);
      if(!c.valid || c.bass!=null) return tok;            // skip non-chords & slash chords (bass not preserved)
      return analyze(c, ctx.keyPc, ctx.minor).roman;
    }
    if(parseChord(tok).valid) return tok;                  // already a chord
    return romanToChord(tok, ctx) || tok;
  };
  const out = lines.map((raw, i)=>{
    if(raw.trim()==='' || /^\s*(\/\/|#|@)/.test(raw)) return raw;
    if(/^\s*(title|key|time|bpm|tempo)\s*:/i.test(raw)) return raw;
    const ctx = activeKeyAt(full, i);
    let prefix='', body=raw;
    const dm = /^(\s*[A-Za-z][\w-]*\s*=\s*)(.+)$/.exec(raw);   // named def: only convert the value
    if(dm && dm[2].includes('|')){ prefix = dm[1]; body = dm[2]; }
    let bodyT;
    if(/\[[^\]]+\]/.test(body)){
      bodyT = body.replace(/\[([^\]]+)\]/g, (m,s)=>'['+conv(s.trim(), ctx)+']');
    } else if(body.includes('|') || lineIsChordish(body, ctx)){
      bodyT = body.replace(CHORD_TOKEN_RE, t=>conv(t, ctx));
    } else { return raw; }
    return prefix + bodyT;
  });
  srcEl.value = out.join('\n'); refresh(); autosave();
  toast(toRoman ? 'Converted chords → Roman numerals' : 'Converted Roman → chords');
}
function lineIsChordish(s, ctx){
  const t = s.replace(/\s*~\w*\s*$/,'').trim().split(/\s+/).filter(Boolean);
  return t.length>0 && t.every(x=>!!resolveChordToken(x, ctx));
}

  lines[line] = L.slice(0,start) + newSym + L.slice(end);
  srcEl.value = lines.join('\n');
  refresh();
}

function openSubMenu(chip){

  const sym = chip.dataset.sym;

  // use the key in effect at this chord (supports mid-song key changes)
  const kPc = chip.dataset.kpc!=null ? +chip.dataset.kpc : doc.keyPc;
  const kMin = chip.dataset.kmin!=null ? chip.dataset.kmin==='1' : doc.minor;
  const kFlats = chip.dataset.flats!=null ? chip.dataset.flats==='1' : doc.useFlats;
  const subs = getSubstitutions(c, kPc, kFlats, kMin);
  const notes = getChordNotes(c).join(' ');
  let html = `<div class="pop-h">Substitute &nbsp;<b>${escapeHtml(sym)}</b></div>`;
  html += `<div class="opt" style="cursor:default"><span class="o-lbl">notes</span><span class="o-sym" style="color:var(--accent)">${escapeHtml(notes)}</span></div>`;
  html += `<div style="padding:4px 8px 8px">${pianoSVG(c)}</div><div class="sep"></div>`;
  if(subs.length===0) html += `<div class="opt"><span class="o-lbl">no suggestions</span></div>`;
  subs.forEach(s=>{
    html += `<div class="opt" data-sym="${escapeAttr(s.sym)}"><span class="o-sym">${escapeHtml(s.sym)}</span><span class="o-lbl">${escapeHtml(s.label)}</span></div>`;
  });
  html += `<div class="sep"></div>`;
  html += `<div class="opt" data-rename="1"><span class="o-lbl">✎ Type a chord manually…</span></div>`;
  popEl.innerHTML = html;
  popEl.classList.add('show');                 // show first so we can measure it
  const r = chip.getBoundingClientRect();
  const pw = popEl.offsetWidth, ph = popEl.offsetHeight;
  // horizontal: keep on screen
  let left = Math.max(8, Math.min(r.left, window.innerWidth - pw - 8));
  // vertical: drop below, but flip above if it would be cut off at the bottom
  const spaceBelow = window.innerHeight - r.bottom;
  let top;
  if(spaceBelow < ph + 12 && r.top > spaceBelow) top = r.top - ph - 6;   // flip above
  else top = r.bottom + 6;
  top = Math.max(8, Math.min(top, window.innerHeight - ph - 8));         // final clamp
  popEl.style.left = left+'px';
  popEl.style.top = top+'px';
  popEl.querySelectorAll('.opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      if(opt.dataset.rename){

        if(v){ replaceAtSource(line,start,end,v.trim()); toast('Replaced with '+v.trim()); }

      }

  });
}

/* ============================================================
   TRANSPOSITION COMMANDS
   ============================================================ */
function transposeDoc(interval, targetKeyName){
  const lines = srcEl.value.split('\n');
  const curKeyPc = doc.keyPc;
  let useFlats;
  let newKeyName;
  if(targetKeyName){
    newKeyName = targetKeyName;
    interval = ((noteToPc(targetKeyName) - curKeyPc)+12)%12;
    useFlats = keyUsesFlats(targetKeyName);
  } else {
    const np = ((curKeyPc + interval)%12+12)%12;
    useFlats = keyUsesFlats(doc.key) && interval%12===0 ? doc.useFlats : (interval<0);
    // pick spelling that best fits the new key: default to sharps unless flat-friendly
    newKeyName = pcToName(np, preferFlatsForPc(np)) + (doc.minor ? 'm' : '');  // keep minor
    useFlats = keyUsesFlats(newKeyName);
  }
  const out = lines.map(raw=>{
    const dir = /^(\s*key\s*:\s*)(.+)$/i.exec(raw);
    if(dir){
      // transpose EACH key directive by the same interval (preserves mid-song key changes)
      const pk = parseKey(dir[2]);
      const np = ((pk.pc + interval)%12+12)%12;
      return dir[1] + pcToName(np, useFlats) + (pk.minor ? 'm' : '');
    }
    if(/^\s*(title|time|bpm|tempo)\s*:/i.test(raw)) return raw;
    if(/^\s*#/.test(raw)) return raw;
    return transposeLine(raw, interval, useFlats);
  });
  srcEl.value = out.join('\n');
  refresh();
  toast('Transposed to '+newKeyName);
}
function preferFlatsForPc(pc){
  // common spelling: F,Bb,Eb,Ab,Db,Gb prefer flats
  return [1,3,5,6,8,10].includes(pc) ? [5,10,3,8,1].includes(pc) : false;
}
function transposeLine(line, interval, useFlats){
  // transpose chords inside [..] and bare/bar chord tokens
  if(/\[[^\]]+\]/.test(line)){
    return line.replace(/\[([^\]]+)\]/g,(_,s)=>'['+transposeSymbol(s,interval,useFlats)+']');
  }
  if(line.includes('|') || isBareChordLine(line)){
    // match chord tokens by note-letter, ignoring bar lines / spacing (handles "|Bm|D|" with no spaces)
    return line.replace(/[A-Ga-g][^\s|]*/g, t=> parseChord(t).valid ? transposeSymbol(t,interval,useFlats) : t);
  }
  return line;
}
function isBareChordLine(line){
  const toks=line.trim().split(/\s+/).filter(Boolean);
  return toks.length>0 && toks.every(t=>parseChord(t).valid);
}

function leadSheetLines(segs){
  let chordLine='', lyricLine='';
  segs.forEach(seg=>{
    const lyr = seg.ly || '';
    if(seg.chord){
      if(chordLine.length < lyricLine.length) chordLine += ' '.repeat(lyricLine.length - chordLine.length);
      chordLine += seg.chord.sym + ' ';
      lyricLine += lyr;
      if(lyricLine.length < chordLine.length) lyricLine += ' '.repeat(chordLine.length - lyricLine.length);
    } else { lyricLine += lyr; }
  });
  return { chordLine: chordLine.replace(/\s+$/,''), lyricLine: lyricLine.replace(/\s+$/,'') };
}
function buildMarkdown(d){
  const meta = `**Key:** ${d.key}  ·  **Time:** ${d.time}` + (d.bpm ? `  ·  **BPM:** ${d.bpm}` : '');
  const out = ['# ' + (d.title || 'Untitled Song'), '', meta, ''];
  const barsLine = bars => '`| ' + bars.map(bar => bar.chords.map(c=>c.sym).join(' ') || '·').join(' | ') + ' |`';
  d.blocks.forEach(b=>{
    if(b.type==='section'){ out.push('', '## ' + b.text, ''); }
    else if(b.type==='comment'){ /* skip */ }
    else if(b.type==='named'){
      if(!b.missing){ out.push('**'+b.name+(b.ref?'':' =')+'** ' + barsLine(b.bars), ''); }
    }
    else if(b.type==='bars'){
      out.push(barsLine(b.bars), '');
    } else if(b.type==='lyric'){
      const {chordLine, lyricLine} = leadSheetLines(b.segs);
      out.push('```', chordLine, lyricLine, '```');
    } else if(b.type==='plain' && b.text.trim()){ out.push(b.text); }
  });
  return out.join('\n') + '\n';
}
function exportMarkdown(){
  const md = buildMarkdown(doc);
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (doc.title || 'song').replace(/[^\w\-]+/g,'_') + '.md';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast('Exported Markdown');
}
function exportPDF(){
  const root = document.documentElement;
  const prev = root.getAttribute('data-theme');
  root.setAttribute('data-theme','light');           // print reads best on light
  const restore = ()=>{ root.setAttribute('data-theme', prev); window.removeEventListener('afterprint', restore); };
  window.addEventListener('afterprint', restore);
  toast('Opening print… choose “Save as PDF”');
  setTimeout(()=> window.print(), 150);
}

/* ============================================================
   CHORD AUTOCOMPLETE (in editor)
   ============================================================ */
const acEl=document.getElementById('ac'), mirror=document.getElementById('mirror');
const QUALITIES=['','maj7','m','m7','7','m7b5','dim7','sus4','sus2','6','9','add9','13','m9','maj9'];
let acItems=[], acActive=0, acWordStart=0, acMode='chord', acTitle='';
function maybeAutocomplete(){
  const pos=srcEl.selectionStart;
  const upto=srcEl.value.slice(0,pos);
  const lineStart=upto.lastIndexOf('\n')+1;
  const curLine=upto.slice(lineStart);
  if(/^\s*(title|key|time|bpm|tempo)\s*:/i.test(curLine) || /^\s*#/.test(curLine)){ hideAc(); return; }

  // ">" operator: suggest the next chord based on the preceding chord + active key
  if(upto[pos-1]==='>'){
    const seg = upto.slice(lineStart, pos-1);
    const pm = /(?:\[([^\]]+)\]|([A-Ga-g][^\s|>\]]*))\s*$/.exec(seg);
    const prevSym = pm ? (pm[1]||pm[2]) : null;
    const lineIdx = (upto.match(/\n/g)||[]).length;
    const ctx = activeKeyAt(srcEl.value, lineIdx);
    const sug = nextChordSuggestions(prevSym, ctx);
    if(!sug.length){ hideAc(); return; }
    acMode='suggest'; acWordStart=pos-1;          // replace the ">"
    acTitle = prevSym ? `After ${prevSym} →` : 'Likely start →';
    acItems = sug.map(s=>({sym:s.sym, q:`${s.rn} · ${s.pct}%`}));
    acActive=0; renderAc(); positionAc(pos);
    return;
  }

  const wordMatch=/([A-Ga-g][#b]?[A-Za-z0-9]*)$/.exec(upto);
  if(!wordMatch){ hideAc(); return; }
  const word=wordMatch[1];
  acMode='chord'; acTitle=''; acWordStart=pos-word.length;
  const rootM=/^([A-Ga-g][#b]?)(.*)$/.exec(word);
  if(!rootM){ hideAc(); return; }
  const root=rootM[1].charAt(0).toUpperCase()+rootM[1].slice(1), tail=rootM[2];
  acItems=QUALITIES.filter(q=>q.startsWith(tail)).slice(0,7).map(q=>({sym:root+q, q:q||'maj triad'}));
  if(acItems.length===0 || (acItems.length===1 && acItems[0].sym===word)){ hideAc(); return; }
  acActive=0; renderAc(); positionAc(pos);
}
function renderAc(){
  const head = acTitle ? `<div class="ai-head">${escapeHtml(acTitle)}</div>` : '';
  acEl.innerHTML=head+acItems.map((it,i)=>`<div class="ai ${i===acActive?'active':''}" data-i="${i}"><span>${escapeHtml(it.sym)}</span><span class="hint">${escapeHtml(it.q)}</span></div>`).join('');
  acEl.querySelectorAll('.ai').forEach(el=>el.onmousedown=ev=>{ ev.preventDefault(); acceptAc(+el.dataset.i); });
  acEl.classList.add('show');
}
function positionAc(pos){
  // mirror technique for caret coords
  const cs=getComputedStyle(srcEl);
  ['fontFamily','fontSize','lineHeight','padding','letterSpacing','whiteSpace','wordWrap','width'].forEach(p=>{});
  mirror.style.cssText=`position:absolute;visibility:hidden;white-space:pre-wrap;word-wrap:break-word;`+
    `font-family:${cs.fontFamily};font-size:${cs.fontSize};line-height:${cs.lineHeight};`+
    `padding:${cs.padding};letter-spacing:${cs.letterSpacing};width:${srcEl.clientWidth}px;`;
  const before=srcEl.value.slice(0,pos);
  mirror.textContent=before;
  const span=document.createElement('span'); span.textContent='​'; mirror.appendChild(span);
  const wrapRect=srcEl.getBoundingClientRect();
  const sx=span.offsetLeft - srcEl.scrollLeft, sy=span.offsetTop - srcEl.scrollTop;
  acEl.style.left=(wrapRect.left+sx)+'px';
  acEl.style.top=(wrapRect.top+sy+22)+'px';
}
function hideAc(){ acEl.classList.remove('show'); acItems=[]; }
function acceptAc(i){
  const it=acItems[i]; if(!it) return;
  const pos=srcEl.selectionStart;
  let insert=it.sym;
  if(acMode==='suggest'){           // replace the ">"; add a leading space if glued to a chord
    const before=srcEl.value[acWordStart-1];
    if(before && !/[\s|]/.test(before)) insert=' '+insert;
  }
  srcEl.value=srcEl.value.slice(0,acWordStart)+insert+srcEl.value.slice(pos);
  const np=acWordStart+insert.length;
  srcEl.selectionStart=srcEl.selectionEnd=np;
  hideAc(); refresh(); srcEl.focus();
}
srcEl.addEventListener('keydown', e=>{
  if(!acEl.classList.contains('show')) return;
  if(e.key==='ArrowDown'){ acActive=Math.min(acActive+1,acItems.length-1); renderAc(); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ acActive=Math.max(acActive-1,0); renderAc(); e.preventDefault(); }
  else if(e.key==='Tab' || (e.key==='Enter' && acItems.length)){ acceptAc(acActive); e.preventDefault(); }
  else if(e.key==='Escape'){ hideAc(); }
});
srcEl.addEventListener('blur', ()=>setTimeout(hideAc,120));
srcEl.addEventListener('scroll', hideAc);
srcEl.addEventListener('click', hideAc);
